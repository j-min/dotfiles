# Cross-platform tmux config (macOS + Linux)
# Clipboard: OSC 52 via set-clipboard — works in VS Code, iTerm2, WezTerm, Ghostty, etc.

# --- General ---

set -g mouse on
set -g focus-events on
set -g allow-rename off
set -g automatic-rename off
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0

# --- Key bindings ---

unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux/tmux.conf \; display "tmux.conf reloaded"

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Copy mode (vi) ---

set -s set-clipboard on
setw -g mode-keys vi

bind -T edit-mode-vi Up send -X history-up
bind -T edit-mode-vi Down send -X history-down
unbind -T copy-mode-vi Space
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

bind P paste-buffer

# --- Appearance ---

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:RGB"
set -ga terminal-overrides ",xterm-256color:RGB"
set -ga terminal-overrides ",*256col*:Tc"

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g pane-border-style "bg=colour235,fg=colour238"
set -g pane-active-border-style "bg=colour236,fg=colour51"

setw -g clock-mode-colour colour135
setw -g mode-style "bold,fg=colour196,bg=colour238"
set -g message-style "bold,fg=colour232,bg=colour166"

set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-style "bg=colour234,fg=colour137,dim"

set -g status-left '#[fg=colour81]#S #[fg=colour240]| '
set -g status-left-length 20
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50

setw -g window-status-style "fg=colour138,bg=colour235,none"
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
setw -g window-status-current-style "fg=colour81,bg=colour238,bold"
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-bell-style "bold,fg=colour255,bg=colour1"

# --- Plugins ---

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
